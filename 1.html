<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Floating Slip</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      /* แก้ไขให้รูปอยู่ตรงกลางและขนาดพอดี */
      .floating-slip {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        
        /* เปลี่ยนจาก % เป็น px เพื่อไม่ให้รูปแตกเต็มจอในคอม */
        width: 280px; 
        height: auto;
        
        z-index: 9999;
        pointer-events: none;
        
        /* เพิ่มขอบขาวและเงาเพื่อให้ดูเหมือนสลิปลอยอยู่จริงๆ */
        border: 5px solid white;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        
        /* ป้องกันปัญหารูปดำ (Background) */
        background-color: white; 
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <img src="https://raw.githubusercontent.com/Famgithub-server/QR/refs/heads/main/12345.png" 
         class="floating-slip" 
         alt="Slip">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

  </body>
</html>
