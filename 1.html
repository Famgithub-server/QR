<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Slip</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* CSS บังคับให้รูปลอยอยู่ตรงกลางหน้าจอและอยู่หน้าสุดเสมอ */
      .overlay-image {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80%; /* ความกว้างรูป 80% ของหน้าจอมือถือ */
        max-width: 400px;
        z-index: 9999; /* บังคับให้อยู่เลเยอร์บนสุดทับกล้อง */
        pointer-events: none;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <img src="12345.png" class="overlay-image" onerror="alert('ระบบหาไฟล์รูปชื่อ 12345.png ไม่เจอครับ! เช็คชื่อไฟล์หรือโฟลเดอร์อีกรอบนะครับเจ้านาย'); this.style.display='none';">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

  </body>
</html>
